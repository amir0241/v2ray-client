name: Android Build and Test

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Bootstrap Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.12

    - name: Regenerate Official Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 9.3.1 --distribution-type bin

    - name: Set up Environment Secrets
      run: |
        if [ ! -f .env ]; then
          cp .env.example .env
        fi

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build and Run Tests
      run: ./gradlew testDebugUnitTest assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 7
